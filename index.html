<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DobiMoney Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/build/index.min.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        #loginScreen { z-index: 100; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-2xl font-bold mb-6 text-slate-800">DobiMoney Login</h1>
            <input type="password" id="passInput" placeholder="Jelszó" class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Belépés</button>
        </div>
    </div>

    <div id="app" class="hidden pb-20">
        <header class="p-6 flex justify-between items-center bg-white shadow-sm sticky top-0 z-10">
            <h2 class="text-xl font-bold text-slate-800">Freelance Tracker</h2>
            <button onclick="toggleModal()" class="bg-green-500 text-white w-12 h-12 rounded-full text-2xl shadow-lg flex items-center justify-center">+</button>
        </header>

        <main class="p-4 max-w-4xl mx-auto">
            <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
                <canvas id="invoiceChart"></canvas>
            </div>

            <div id="invoiceList" class="space-y-3">
                </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4">Új számla hozzáadása</h3>
            <div class="space-y-4">
                <input type="text" id="company" placeholder="Cég neve" class="w-full p-2 border rounded">
                <select id="currency" class="w-full p-2 border rounded">
                    <option value="HUF">HUF</option>
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                </select>
                <input type="number" id="amount" placeholder="Összeg HUF-ban" class="w-full p-2 border rounded">
                <input type="date" id="date" class="w-full p-2 border rounded">
                <div class="flex gap-2">
                    <button onclick="toggleModal()" class="flex-1 py-2 bg-slate-200 rounded">Mégse</button>
                    <button onclick="saveInvoice()" class="flex-1 py-2 bg-blue-600 text-white rounded">Mentés</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart;
        const targetMonthly = 2000000;
        let invoices = JSON.parse(localStorage.getItem('invoices')) || [];

        // Auth Logic
        function checkPass() {
            const pass = document.getElementById('passInput').value;
            if (pass === 'dobimoney') {
                localStorage.setItem('auth', 'true');
                showApp();
            } else {
                alert('Hibás jelszó!');
            }
        }

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            initChart();
            renderList();
        }

        if (localStorage.getItem('auth') === 'true') showApp();

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
            document.getElementById('date').valueAsDate = new Date();
        }

        function saveInvoice() {
            const newInv = {
                id: Date.now(),
                company: document.getElementById('company').value,
                currency: document.getElementById('currency').value,
                amount: parseFloat(document.getElementById('amount').value),
                date: document.getElementById('date').value
            };
            
            if (!newInv.amount || !newInv.date) return alert('Tölts ki mindent!');
            
            invoices.push(newInv);
            localStorage.setItem('invoices', JSON.stringify(invoices));
            toggleModal();
            updateUI();
        }

        function updateUI() {
            renderList();
            updateChart();
        }

        function renderList() {
            const list = document.getElementById('invoiceList');
            list.innerHTML = invoices.sort((a,b) => new Date(b.date) - new Date(a.date))
                .map(inv => `
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-blue-500 flex justify-between">
                        <div>
                            <div class="font-bold">${inv.company}</div>
                            <div class="text-xs text-slate-500">${inv.date}</div>
                        </div>
                        <div class="font-mono font-semibold">${inv.amount.toLocaleString()} Ft</div>
                    </div>
                `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('invoiceChart').getContext('2d');
            
            // Cél vonal generálása (Jan-Dec kumulatív)
            const targetData = Array.from({length: 12}, (_, i) => (i + 1) * targetMonthly);
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Már', 'Ápr', 'Máj', 'Jún', 'Júl', 'Aug', 'Szep', 'Okt', 'Nov', 'Dec'],
                    datasets: [{
                        label: 'Cél (havi 2M)',
                        data: targetData,
                        borderColor: 'rgba(0,0,0,0.1)',
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    }, {
                        label: 'Tényleges Bevétel',
                        data: getCumulativeData(),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, ticks: { callback: v => v/1000000 + 'M' } }
                    }
                }
            });
        }

        function getCumulativeData() {
            const monthlyTotals = new Array(12).fill(0);
            invoices.forEach(inv => {
                const month = new Date(inv.date).getMonth();
                monthlyTotals[month] += inv.amount;
            });
            
            let runningTotal = 0;
            return monthlyTotals.map(sum => {
                if (sum === 0 && runningTotal === 0 && new Date().getMonth() < monthlyTotals.indexOf(sum)) return null;
                runningTotal += sum;
                return runningTotal;
            });
        }

        function updateChart() {
            myChart.data.datasets[1].data = getCumulativeData();
            myChart.update();
        }
    </script>
</body>
</html>
