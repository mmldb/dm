<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobi Tracker v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DobiMoney">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <link rel="manifest" href="manifest.json">

    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #000; color: #fff; -webkit-font-smoothing: antialiased; }
        .border-b-thin { border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea, select { background: #000 !important; color: #fff !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; border-radius: 0 !important; padding: 10px !important; outline: none; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #000; transition: .2s; border: 2px solid #fff; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #fff; transition: .2s; }
        input:checked + .slider { background-color: #fff; }
        input:checked + .slider:before { transform: translateX(24px); background-color: #000; }

        .paid-row { opacity: 0.3; }
        .expense-text { color: #ff4444; }
        .paid-badge { background: #fff; color: #000; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-3xl mx-auto">

    <div id="loginScreen" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
        <div class="w-64 text-center">
            <p class="text-[10px] mb-4 opacity-50 uppercase tracking-[0.3em]">System_Access</p>
            <input type="password" id="passInput" class="w-full text-center mb-6 text-2xl tracking-widest" placeholder="••••">
            <button onclick="checkPass()" class="w-full border-2 border-white py-3 text-xs uppercase font-bold tracking-widest hover:bg-white hover:text-black transition">Enter_OS</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="mb-12">
            <div class="flex justify-between items-end border-b-thin pb-6">
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter uppercase">Dobi_Money</h1>
                    <p class="text-[10px] opacity-40 uppercase tracking-widest">v6.0.0 / Clone_Protocol</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] opacity-40 uppercase mb-1">Annual Progress</p>
                    <p id="targetPercent" class="text-2xl font-bold">0%</p>
                </div>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10 mb-12">
            <div>
                <p class="text-[10px] opacity-30 uppercase mb-4 border-b border-white/10 pb-1 tracking-widest">Annual_Overview</p>
                <div class="flex justify-between py-1"><span class="text-xs opacity-60">Total Invoiced</span> <span id="totalInvoiced" class="font-bold text-sm">0 Ft</span></div>
                <div class="flex justify-between py-1 border-t border-white/5 mt-2 pt-1"><span class="text-xs expense-text">Total Expenses</span> <span id="totalExpenses" class="font-bold text-sm expense-text">0 Ft</span></div>
                <div class="flex justify-between py-1"><span class="text-xs opacity-40">Monthly Avg</span> <span id="monthlyAvg" class="font-bold text-sm opacity-80">0 Ft</span></div>
            </div>
            <div>
                <p class="text-[10px] opacity-30 uppercase mb-4 border-b border-white/10 pb-1 tracking-widest">Monthly_Data</p>
                <div class="flex justify-between py-1"><span class="text-xs opacity-60">Issued</span> <span id="monthInvoiced" class="font-bold text-sm">0 Ft</span></div>
                <div class="flex justify-between py-1 mt-2 pt-1 border-t border-white/5"><span class="text-xs expense-text">Expenses</span> <span id="monthExpenses" class="font-bold text-sm expense-text">0 Ft</span></div>
            </div>
        </section>

        <section class="mb-14 h-64 w-full">
            <canvas id="invoiceChart"></canvas>
        </section>

        <div class="mb-14">
            <button onclick="openModal()" class="w-full border-2 border-white/20 py-5 text-xs uppercase tracking-[0.5em] font-bold hover:border-white transition">+ Add Entry</button>
        </div>

        <section class="space-y-6">
            <p class="text-[10px] opacity-20 uppercase tracking-[0.4em] mb-4">Archive_Logs</p>
            <div id="invoiceList" class="divide-y divide-white/5 border-t border-white/5"></div>
        </section>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/98 flex items-center justify-center p-4 z-50">
        <div class="w-full max-w-sm">
            <h3 class="text-[10px] uppercase tracking-[0.3em] mb-10 text-center opacity-40">Entry_Setup</h3>
            <input type="hidden" id="editId">
            <div class="space-y-6">
                <div class="flex items-center justify-between border border-white/20 p-4">
                    <select id="type" class="bg-transparent border-none p-0 text-xs uppercase font-bold">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <div class="flex items-center gap-4">
                        <label class="text-[9px] uppercase opacity-50 font-bold">Recurring</label>
                        <label class="switch">
                            <input type="checkbox" id="recurring">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <input type="text" id="company" placeholder="PARTNER / SERVICE" class="w-full text-xs uppercase p-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="amount" placeholder="AMOUNT HUF" class="w-full text-xs p-4">
                    <input type="date" id="date" class="w-full text-xs p-4 uppercase">
                </div>
                <textarea id="note" placeholder="NOTES / DETAILS" class="w-full h-24 text-xs p-4 resize-none"></textarea>
                
                <div class="flex gap-4 pt-6">
                    <button onclick="closeModal()" class="flex-1 py-4 text-[10px] uppercase font-bold opacity-30 hover:opacity-100 transition">Abort</button>
                    <button onclick="saveInvoice()" class="flex-1 bg-white text-black py-4 text-[10px] font-bold uppercase tracking-widest">Commit</button>
                </div>
                <button id="deleteBtn" onclick="deleteInvoice()" class="w-full py-4 text-red-500 text-[9px] hidden uppercase font-bold opacity-40 hover:opacity-100 mt-2">Delete_Record</button>
            </div>
        </div>
    </div>

    <script>
        let myChart;
        const targetMonthly = 2000000;
        let entries = JSON.parse(localStorage.getItem('invoices')) || [];
        let editingId = null;

        function checkPass() {
            if (document.getElementById('passInput').value === 'dobimoney') {
                localStorage.setItem('auth', 'true');
                showApp();
            } else { alert('ACCESS_DENIED'); }
        }
        if (localStorage.getItem('auth') === 'true') showApp();

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            processRecurrence();
            
            initChart();
            persistAndRefresh();
        }

        // --- CLONE PROTOCOL LOGIC ---
        function processRecurrence() {
            const now = new Date();
            let changed = false;

            // Csak azokat a tételeket vesszük mintának, amik recurring-ok DE nem másolatok (clones)
            const templates = entries.filter(e => e.recurring && !e.recurringClone);

            templates.forEach(t => {
                const startDate = new Date(t.date);
                // Következő hónap elsejétől indítjuk a figyelést
                let checkDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 1);

                while (checkDate <= now) {
                    const month = checkDate.getMonth();
                    const year = checkDate.getFullYear();

                    // Megnézzük, van-e már ilyen tétel ebben a hónapban (akár clone, akár nem)
                    const exists = entries.some(e => 
                        e.company === t.company && 
                        e.amount === t.amount &&
                        e.type === t.type &&
                        new Date(e.date).getMonth() === month &&
                        new Date(e.date).getFullYear() === year
                    );

                    if (!exists) {
                        entries.push({
                            ...t,
                            id: Date.now() + Math.random(),
                            date: new Date(year, month, 1).toISOString().split('T')[0],
                            paid: t.type === 'expense',
                            recurring: true,
                            recurringClone: true // Jelöljük, hogy ez egy másolat
                        });
                        changed = true;
                    }
                    checkDate.setMonth(checkDate.getMonth() + 1);
                }
            });

            if (changed) {
                localStorage.setItem('invoices', JSON.stringify(entries));
            }
        }

        function openModal(id = null) {
            editingId = id;
            document.getElementById('modal').classList.remove('hidden');
            const deleteBtn = document.getElementById('deleteBtn');
            if (id) {
                const ent = entries.find(i => i.id === id);
                document.getElementById('type').value = ent.type || 'income';
                document.getElementById('company').value = ent.company;
                document.getElementById('amount').value = ent.amount;
                document.getElementById('date').value = ent.date;
                document.getElementById('note').value = ent.note || "";
                document.getElementById('recurring').checked = ent.recurring || false;
                deleteBtn.classList.remove('hidden');
            } else {
                document.getElementById('type').value = 'income';
                document.getElementById('company').value = "";
                document.getElementById('amount').value = "";
                document.getElementById('note').value = "";
                document.getElementById('date').valueAsDate = new Date();
                document.getElementById('recurring').checked = false;
                deleteBtn.classList.add('hidden');
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveInvoice() {
            const data = {
                id: editingId || Date.now(),
                type: document.getElementById('type').value,
                company: document.getElementById('company').value || 'SYSTEM_PRTNR',
                amount: parseFloat(document.getElementById('amount').value) || 0,
                date: document.getElementById('date').value,
                note: document.getElementById('note').value,
                recurring: document.getElementById('recurring').checked,
                recurringClone: editingId ? (entries.find(e => e.id === editingId).recurringClone || false) : false
            };

            if (editingId) {
                const index = entries.findIndex(i => i.id === editingId);
                entries[index] = data;
            } else {
                entries.push({ ...data, paid: data.type === 'expense' });
            }

            // Mentés után azonnal futtatjuk az ismétlődést, hogy ha most állítottad be, rögtön generáljon
            processRecurrence();
            persistAndRefresh();
            closeModal();
        }

        function togglePaid(id) {
            const index = entries.findIndex(i => i.id === id);
            if (entries[index].type === 'expense') return;
            entries[index].paid = !entries[index].paid;
            persistAndRefresh();
        }

        function deleteInvoice() {
            if (confirm('CONFIRM_ENTRY_DELETE?')) {
                entries = entries.filter(i => i.id !== editingId);
                persistAndRefresh();
                closeModal();
            }
        }

        function persistAndRefresh() {
            localStorage.setItem('invoices', JSON.stringify(entries));
            calculateStats();
            renderList();
            updateChart();
        }

        function calculateStats() {
            const now = new Date();
            const elapsedMonths = now.getMonth() + 1;
            const incomes = entries.filter(e => e.type !== 'expense');
            const expenses = entries.filter(e => e.type === 'expense');

            const tInvoiced = incomes.reduce((sum, i) => sum + i.amount, 0);
            const tExpenses = expenses.reduce((sum, i) => sum + i.amount, 0);
            const mInvoiced = incomes.filter(e => new Date(e.date).getMonth() === now.getMonth()).reduce((s,i)=>s+i.amount,0);
            const mExpenses = expenses.filter(e => new Date(e.date).getMonth() === now.getMonth()).reduce((s,i)=>s+i.amount,0);

            document.getElementById('totalInvoiced').innerText = tInvoiced.toLocaleString() + ' Ft';
            document.getElementById('totalExpenses').innerText = tExpenses.toLocaleString() + ' Ft';
            document.getElementById('monthlyAvg').innerText = Math.round(tInvoiced / elapsedMonths).toLocaleString() + ' Ft';
            document.getElementById('monthInvoiced').innerText = mInvoiced.toLocaleString() + ' Ft';
            document.getElementById('monthExpenses').innerText = mExpenses.toLocaleString() + ' Ft';
            document.getElementById('targetPercent').innerText = Math.round((tInvoiced / (targetMonthly * 12)) * 100) + '%';
        }

        function renderList() {
            const list = document.getElementById('invoiceList');
            list.innerHTML = entries.sort((a,b) => new Date(b.date) - new Date(a.date))
                .map(ent => {
                    const isExp = ent.type === 'expense';
                    return `
                    <div class="py-6 flex justify-between items-start ${ent.paid ? 'paid-row' : ''}">
                        <div class="flex gap-4">
                            ${isExp ? '<div class="w-4 text-[8px] mt-1 opacity-20">EXP</div>' : `<input type="checkbox" ${ent.paid ? 'checked' : ''} onchange="togglePaid(${ent.id})" class="mt-1 w-4 h-4 accent-white">`}
                            <div>
                                <div class="text-xs font-bold uppercase tracking-tight ${isExp ? 'expense-text' : ''}">${ent.company} ${ent.recurring ? `<span class="ml-2 text-[7px] border border-white/20 px-1 opacity-40">${ent.recurringClone ? 'AUTO' : 'ROOT'}</span>` : ''}</div>
                                <div class="text-[9px] opacity-30 mt-1">${ent.date} ${ent.note ? ' // ' + ent.note : ''}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-bold tabular-nums ${isExp ? 'expense-text' : ''}">${isExp ? '-' : ''}${ent.amount.toLocaleString()}</div>
                            <button onclick="openModal(${ent.id})" class="text-[8px] opacity-20 hover:opacity-100 underline uppercase mt-2 tracking-widest">Edit</button>
                        </div>
                    </div>`;
                }).join('');
        }

        function initChart() {
            const ctx = document.getElementById('invoiceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'],
                    datasets: [
                        { label: 'TARGET', data: Array.from({length: 12}, (_, i) => (i + 1) * targetMonthly), borderColor: 'rgba(255,255,255,0.05)', borderDash: [2, 2], pointRadius: 0, borderWidth: 1 },
                        { label: 'ISSUED', data: getChartData('income'), borderColor: '#fff', tension: 0.1, borderWidth: 2, pointRadius: 2, pointBackgroundColor: '#fff' },
                        { label: 'EXPENSES', data: getChartData('expense'), borderColor: '#ff4444', tension: 0.1, borderWidth: 1.5, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 9 }, callback: v => v/1000000 + 'm' } },
                        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 9 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function getChartData(type) {
            const monthlyTotals = new Array(12).fill(0);
            entries.forEach(item => {
                if ((item.type || 'income') !== type) return;
                const month = new Date(item.date).getMonth();
                monthlyTotals[month] += item.amount;
            });
            let runningTotal = 0;
            return monthlyTotals.map((sum, index) => {
                runningTotal += sum;
                return (index <= new Date().getMonth() || sum > 0) ? runningTotal : null;
            });
        }

        function updateChart() {
            if (!myChart) return;
            myChart.data.datasets[1].data = getChartData('income');
            myChart.data.datasets[2].data = getChartData('expense');
            myChart.update();
        }
    </script>
</body>
</html>
