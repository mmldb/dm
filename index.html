<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DobiMoney OS v4.0.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Code', monospace; background-color: #0a0a0a; color: #33ff33; }
        .terminal-border { border: 1px solid #33ff33; }
        .terminal-header { border-bottom: 1px solid #33ff33; }
        .btn-terminal { border: 1px solid #33ff33; background: transparent; transition: all 0.2s; }
        .btn-terminal:hover { background: #33ff33; color: #000; }
        .scanline {
            width: 100%; height: 2px; z-index: 99; background: rgba(0, 255, 0, 0.05);
            position: fixed; pointer-events: none; animation: move 4s linear infinite;
        }
        @keyframes move { from { top: 0; } to { top: 100%; } }
        input, select, textarea { background: #1a1a1a !important; color: #33ff33 !important; border: 1px solid #33ff33 !important; }
        .paid-line { color: #22c55e; border-left: 4px solid #22c55e !important; }
        canvas { filter: brightness(1.2) contrast(1.2) hue-rotate(90deg); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="scanline"></div>

    <div id="loginScreen" class="fixed inset-0 bg-black flex items-center justify-center p-6 z-[100]">
        <div class="terminal-border p-8 w-full max-w-md">
            <h1 class="text-xl mb-6 tracking-tighter">AUTHENTICATION REQUIRED_</h1>
            <input type="password" id="passInput" placeholder="ENTER PASSWORD" class="w-full p-3 mb-4 outline-none">
            <button onclick="checkPass()" class="w-full btn-terminal py-3 font-bold uppercase">Execute Login</button>
        </div>
    </div>

    <div id="app" class="hidden max-w-5xl mx-auto">
        <header class="terminal-header pb-4 mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter">DOBIMONEY_OS v4.0.1</h1>
                <p id="clock" class="text-xs opacity-70"></p>
            </div>
            <button onclick="openModal()" class="btn-terminal px-6 py-2 text-xl font-bold">+</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="terminal-border p-4 bg-black/50">
                <p class="text-xs mb-2 opacity-60 uppercase tracking-widest">Current Month Summary [MONTH_VIEW]</p>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px]">Invoiced:</p>
                        <h2 id="monthInvoiced" class="text-xl font-bold text-blue-400">0 Ft</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px]">Received:</p>
                        <h2 id="monthPaid" class="text-xl font-bold text-green-400">0 Ft</h2>
                    </div>
                </div>
            </div>
            <div class="terminal-border p-4 bg-black/50 border-white/20">
                <p class="text-xs mb-2 opacity-60 uppercase tracking-widest">Annual Total [YEAR_VIEW]</p>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px]">Total Invoiced:</p>
                        <h2 id="totalInvoiced" class="text-xl font-bold">0 Ft</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px]">Target Status:</p>
                        <h2 id="yearStatus" class="text-xl font-bold text-yellow-500">0%</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="terminal-border p-4 mb-8 bg-black/30 h-64">
            <canvas id="invoiceChart"></canvas>
        </div>

        <div class="space-y-2">
            <p class="text-xs font-bold mb-4 opacity-50 underline">System.Logs / Recent_Invoices</p>
            <div id="invoiceList" class="space-y-2 text-sm"></div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="terminal-border bg-black p-6 w-full max-w-md">
            <h3 id="modalTitle" class="text-lg font-bold mb-6 underline uppercase">Add New Record</h3>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="text" id="company" placeholder="PARTNER NAME" class="w-full p-3 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="amount" placeholder="AMOUNT (HUF)" class="w-full p-3 outline-none">
                    <input type="date" id="date" class="w-full p-3 outline-none uppercase">
                </div>
                <textarea id="note" placeholder="NOTES (Invoice #, details, etc.)" class="w-full p-3 h-20 outline-none text-xs"></textarea>
                
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 opacity-60 hover:opacity-100 transition">ABORT</button>
                    <button onclick="saveInvoice()" class="flex-1 btn-terminal py-3 font-bold">COMMIT</button>
                </div>
                <button id="deleteBtn" onclick="deleteInvoice()" class="w-full py-2 text-red-500 text-[10px] hidden underline">DELETE_RECORD</button>
            </div>
        </div>
    </div>

    <script>
        let myChart;
        const targetMonthly = 2000000;
        let invoices = JSON.parse(localStorage.getItem('invoices')) || [];
        let editingId = null;

        // AUTH
        function checkPass() {
            if (document.getElementById('passInput').value === 'dobimoney') {
                localStorage.setItem('auth', 'true');
                showApp();
            } else { alert('ACCESS DENIED'); }
        }
        if (localStorage.getItem('auth') === 'true') showApp();

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('hu-HU'); }, 1000);
            initChart();
            persistAndRefresh();
        }

        function openModal(id = null) {
            editingId = id;
            document.getElementById('modal').classList.remove('hidden');
            const deleteBtn = document.getElementById('deleteBtn');
            
            if (id) {
                const inv = invoices.find(i => i.id === id);
                document.getElementById('modalTitle').innerText = "Edit Record";
                document.getElementById('company').value = inv.company;
                document.getElementById('amount').value = inv.amount;
                document.getElementById('date').value = inv.date;
                document.getElementById('note').value = inv.note || "";
                deleteBtn.classList.remove('hidden');
            } else {
                document.getElementById('modalTitle').innerText = "Add Record";
                document.getElementById('company').value = "";
                document.getElementById('amount').value = "";
                document.getElementById('note').value = "";
                document.getElementById('date').valueAsDate = new Date();
                deleteBtn.classList.add('hidden');
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveInvoice() {
            const data = {
                company: document.getElementById('company').value || 'UNKNOWN_PRTNR',
                amount: parseFloat(document.getElementById('amount').value) || 0,
                date: document.getElementById('date').value,
                note: document.getElementById('note').value
            };

            if (editingId) {
                const index = invoices.findIndex(i => i.id === editingId);
                invoices[index] = { ...invoices[index], ...data };
            } else {
                invoices.push({ id: Date.now(), ...data, paid: false });
            }

            persistAndRefresh();
            closeModal();
        }

        function togglePaid(id) {
            const index = invoices.findIndex(i => i.id === id);
            invoices[index].paid = !invoices[index].paid;
            persistAndRefresh();
        }

        function deleteInvoice() {
            if (confirm('DELETE PERMANENTLY?')) {
                invoices = invoices.filter(i => i.id !== editingId);
                persistAndRefresh();
                closeModal();
            }
        }

        function persistAndRefresh() {
            localStorage.setItem('invoices', JSON.stringify(invoices));
            calculateStats();
            renderList();
            updateChart();
        }

        function calculateStats() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const total = invoices.reduce((sum, inv) => sum + inv.amount, 0);
            const paid = invoices.filter(i => i.paid).reduce((sum, inv) => sum + inv.amount, 0);
            
            // Havi szűrés
            const monthInvoices = invoices.filter(inv => {
                const d = new Date(inv.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });
            const mInvoiced = monthInvoices.reduce((sum, inv) => sum + inv.amount, 0);
            const mPaid = monthInvoices.filter(i => i.paid).reduce((sum, inv) => sum + inv.amount, 0);

            document.getElementById('totalInvoiced').innerText = total.toLocaleString() + ' Ft';
            document.getElementById('yearStatus').innerText = Math.round((total / (targetMonthly * 12)) * 100) + '%';
            document.getElementById('monthInvoiced').innerText = mInvoiced.toLocaleString() + ' Ft';
            document.getElementById('monthPaid').innerText = mPaid.toLocaleString() + ' Ft';
        }

        function renderList() {
            const list = document.getElementById('invoiceList');
            list.innerHTML = invoices.sort((a,b) => new Date(b.date) - new Date(a.date))
                .map(inv => `
                    <div class="border border-white/10 p-3 bg-black/20 flex flex-col md:flex-row md:items-center justify-between gap-2 ${inv.paid ? 'paid-line' : ''}">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${inv.paid ? 'checked' : ''} onchange="togglePaid(${inv.id})" class="w-5 h-5 cursor-pointer">
                            <div>
                                <div class="font-bold uppercase tracking-widest">${inv.company} <span class="text-[10px] opacity-40 ml-2">${inv.date}</span></div>
                                ${inv.note ? `<div class="text-[10px] text-white/50 mt-1 italic">> ${inv.note}</div>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center justify-between md:justify-end gap-6">
                            <div class="font-bold text-lg">${inv.amount.toLocaleString()} <span class="text-xs">HUF</span></div>
                            <button onclick="openModal(${inv.id})" class="text-[10px] underline hover:text-white transition">EDIT_STUB</button>
                        </div>
                    </div>
                `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('invoiceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [
                        { label: 'TARGET', data: Array.from({length: 12}, (_, i) => (i + 1) * targetMonthly), borderColor: '#ffffff', borderDash: [5, 5], fill: false, pointRadius: 0 },
                        { label: 'ISSUED', data: getChartData(false), borderColor: '#3b82f6', tension: 0.3, borderWidth: 2 },
                        { label: 'PAID', data: getChartData(true), borderColor: '#33ff33', backgroundColor: 'rgba(51, 255, 51, 0.1)', fill: true, tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: '#ffffff10' }, ticks: { color: '#33ff33', font: { size: 9 } } },
                        x: { grid: { display: false }, ticks: { color: '#33ff33', font: { size: 9 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function getChartData(onlyPaid) {
            const monthlyTotals = new Array(12).fill(0);
            invoices.forEach(inv => {
                if (onlyPaid && !inv.paid) return;
                const month = new Date(inv.date).getMonth();
                monthlyTotals[month] += inv.amount;
            });
            let runningTotal = 0;
            return monthlyTotals.map((sum, index) => {
                runningTotal += sum;
                return (index <= new Date().getMonth() || sum > 0) ? runningTotal : null;
            });
        }

        function updateChart() {
            myChart.data.datasets[1].data = getChartData(false);
            myChart.data.datasets[2].data = getChartData(true);
            myChart.update();
        }
    </script>
</body>
</html>
